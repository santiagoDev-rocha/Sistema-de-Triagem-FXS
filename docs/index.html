<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Triagem FXS - Login</title>
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./src/js/script.js" defer></script>
</head>
<body>

    <div class="caixa_login">
        <div class="container">
            <div class="topo">
                <div class="icone">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="texto_topo">
                    <h4 class="sub_topo">Sistema de Triagem</h4>
                    <h3 class="principal_topo">SXF Brasil</h3>
                </div>
            </div>
            
            <form id="login-form">
                <div class="bem_vindo">
                    <h2 class="texto_dark">Bem-vindo</h2>
                    <h3 class="sub_bem_vindo">Faça login para acessar o sistema</h3>
                </div>
                
                <div class="login_senha">
                    <h4 class="texto_dark">Email</h4>
                    <div class="input_container">
                        <i class="fa-regular fa-user input_icon"></i>
                        <input type="email" id="email" placeholder="Digite seu email" required>
                    </div>
                </div>
                
                <div class="login_senha">
                    <h4 class="texto_dark">Senha</h4>
                    <div class="input_container">
                        <i class="fa-solid fa-lock input_icon"></i>
                        <input type="password" id='password' placeholder="Digite sua senha" required>
                    </div>
                </div>
                <p id="mensagem-erro" style="color: red; font-size: 14px; margin-bottom: 10px; display: none;"></p>
                <button type="submit" class="botao">Entrar</button>
            </form>
        </div>

        <p class="texto_embaixo">Síndrome do X Frágil - Checklist Clínico para Triagem Populacional</p>
    </div>
    
</body>
