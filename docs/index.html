<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Triagem FXS - Login</title>
    <link rel="stylesheet" href="/docs/src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/docs/src/js/script.js" defer></script>
</head>
<body>

    <div class="caixa_login">
        <div class="container">
            <div class="topo">
                <div class="icone">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="texto_topo">
                    <h4 class="sub_topo">Sistema de Triagem</h4>
                    <h3 class="principal_topo">SXF Brasil</h3>
                </div>
            </div>
            
            <form>
                <div class="bem_vindo">
                    <h2 class="texto_dark">Bem-vindo</h2>
                    <h3 class="sub_bem_vindo">Faça login para acessar o sistema</h3>
                </div>
                
                <div class="login_senha">
                    <h4 class="texto_dark">Email ou Usuário</h4>
                    <div class="input_container">
                        <i class="fa-regular fa-user input_icon"></i>
                        <input type="text" placeholder="Digite seu email ou usuário">
                    </div>
                </div>
                
                <div class="login_senha">
                    <h4 class="texto_dark">Senha</h4>
                    <div class="input_container">
                        <i class="fa-solid fa-lock input_icon"></i>
                        <input type="password" placeholder="Digite sua senha">
                    </div>
                </div>
                
                    <button type="submit" class="botao"><a href="/docs/src/pages/home.html">Entrar</a></button>
            </form>
        </div>

        <p class="texto_embaixo">Síndrome do X Frágil - Checklist Clínico para Triagem Populacional</p>
    </div>
    
</body>
</html>
